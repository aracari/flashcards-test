<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mobile Flashcard App</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f2f4f8;
    padding: 15px;
}

h1 {
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.controls {
    background: white;
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    margin-bottom: 20px;
}

input[type="file"] {
    width: 100%;
    margin-bottom: 10px;
}

textarea {
    width: 100%;
    height: 100px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    resize: none;
    font-size: 14px;
}

button {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #4f46e5;
    color: white;
    font-size: 15px;
    font-weight: 600;
}

button:active {
    transform: scale(0.98);
}

.secondary {
    background: #64748b;
}

.danger {
    background: #ef4444;
}

.flashcard-container {
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 100%;
    height: 220px;
    perspective: 1000px;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.card.flipped .card-inner {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    backface-visibility: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 600;
    overflow-y: auto;  /* Enables scrolling */
    word-wrap: break-word;
}

.front {
    background: white;
}

.back {
    background: #4f46e5;
    color: white;
    transform: rotateY(180deg);
}

.card-face::-webkit-scrollbar {
    width: 6px;
}
.card-face::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
}

.top-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.top-buttons button {
    flex: 1;
}
</style>
</head>
<body>

<div class="container">
<h1>Flashcards</h1>

<div class="controls">
    <input type="file" id="fileInput" accept=".csv,.txt" />
    <textarea id="textInput" placeholder="Question,Answer OR Question|Answer per line"></textarea>
    <button onclick="processText()">Add Flashcards</button>
    <div class="top-buttons">
        <button class="secondary" onclick="showRandom()">Random</button>
        <button class="danger" onclick="clearCards()">Clear</button>
    </div>
</div>

<div class="flashcard-container">
    <div class="card" id="flashcard" onclick="flipCard()">
        <div class="card-inner">
            <div class="card-face front" id="front"></div>
            <div class="card-face back" id="back"></div>
        </div>
    </div>
</div>

</div>

<script>
let flashcards = JSON.parse(localStorage.getItem("flashcards")) || [];
let currentIndex = 0;

function save() {
    localStorage.setItem("flashcards", JSON.stringify(flashcards));
}

function displayCard(index) {
    if (flashcards.length === 0) {
        document.getElementById("front").innerText = "No flashcards yet.";
        document.getElementById("back").innerText = "Add some above.";
        return;
    }

    currentIndex = index;
    document.getElementById("front").innerText = flashcards[index].question;
    document.getElementById("back").innerText = flashcards[index].answer;
    document.getElementById("flashcard").classList.remove("flipped");
}

function flipCard() {
    document.getElementById("flashcard").classList.toggle("flipped");
}

function parseInput(text) {
    const lines = text.split("\n");
    lines.forEach(line => {
        if (!line.trim()) return;

        let parts = line.includes("|") ? line.split("|") : line.split(",");
        if (parts.length >= 2) {
            flashcards.push({
                question: parts[0].trim(),
                answer: parts.slice(1).join(",").trim()
            });
        }
    });
}

function processText() {
    const text = document.getElementById("textInput").value;
    if (!text.trim()) return;
    parseInput(text);
    document.getElementById("textInput").value = "";
    save();
    displayCard(flashcards.length - 1);
}

document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        parseInput(event.target.result);
        save();
        displayCard(flashcards.length - 1);
    };
    reader.readAsText(file);
});

function showRandom() {
    if (flashcards.length === 0) return;
    const randomIndex = Math.floor(Math.random() * flashcards.length);
    displayCard(randomIndex);
}

function clearCards() {
    if (!confirm("Delete all flashcards?")) return;
    flashcards = [];
    save();
    displayCard(0);
}

displayCard(0);
</script>

</body>
</html>
