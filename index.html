<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcard App</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f7fa;
}

h1 {
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
}

.controls {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    padding: 10px;
    font-size: 14px;
}

button {
    margin-top: 10px;
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4338ca;
}

.flashcard-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    perspective: 1000px;
}

.card-inner {
    position: relative;
    width: 100%;
    height: 140px;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
}

.card.flipped .card-inner {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 15px;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    font-weight: bold;
}

.front {
    background: white;
}

.back {
    background: #4f46e5;
    color: white;
    transform: rotateY(180deg);
}

.delete-btn {
    position: absolute;
    top: 5px;
    right: 8px;
    background: red;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    color: white;
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>Flashcard Generator</h1>

<div class="controls">
    <input type="file" id="fileInput" accept=".csv,.txt" />
    <textarea id="textInput" placeholder="Or paste text here (Format: Question,Answer OR Question|Answer per line)"></textarea>
    <button onclick="processText()">Generate Flashcards</button>
    <button onclick="clearCards()">Clear All Cards</button>
</div>

<div class="flashcard-container" id="flashcards"></div>
</div>

<script>
let flashcards = JSON.parse(localStorage.getItem("flashcards")) || [];

function saveToStorage() {
    localStorage.setItem("flashcards", JSON.stringify(flashcards));
}

function renderCards() {
    const container = document.getElementById("flashcards");
    container.innerHTML = "";

    flashcards.forEach((card, index) => {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        cardDiv.innerHTML = `
            <div class="card-inner">
                <div class="card-face front">
                    ${card.question}
                    <button class="delete-btn" onclick="deleteCard(${index}); event.stopPropagation();">×</button>
                </div>
                <div class="card-face back">
                    ${card.answer}
                </div>
            </div>
        `;
        cardDiv.addEventListener("click", () => {
            cardDiv.classList.toggle("flipped");
        });

        container.appendChild(cardDiv);
    });
}

function parseInput(text) {
    const lines = text.split("\n");
    lines.forEach(line => {
        if (!line.trim()) return;

        let parts;
        if (line.includes("|")) {
            parts = line.split("|");
        } else {
            parts = line.split(",");
        }

        if (parts.length >= 2) {
            flashcards.push({
                question: parts[0].trim(),
                answer: parts.slice(1).join(",").trim()
            });
        }
    });
}

function processText() {
    const text = document.getElementById("textInput").value;
    if (!text.trim()) return;

    parseInput(text);
    document.getElementById("textInput").value = "";
    saveToStorage();
    renderCards();
}

document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        parseInput(event.target.result);
        saveToStorage();
        renderCards();
    };
    reader.readAsText(file);
});

function deleteCard(index) {
    flashcards.splice(index, 1);
    saveToStorage();
    renderCards();
}

function clearCards() {
    if (!confirm("Delete all flashcards?")) return;
    flashcards = [];
    saveToStorage();
    renderCards();
}

renderCards();
</script>

</body>
</html>
